name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  deployments: write

jobs:
  tag-release:
    name: Tag release (CalVer)
    runs-on: ubuntu-latest
    outputs:
      calver_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Compute CalVer tag
        id: tag
        run: |
          BASE=$(date -u +"%Y.%m.%d")
          VERSION="$BASE"
          COUNTER=0
          while git ls-remote --tags origin "refs/tags/${VERSION}" | grep -q .; do
            COUNTER=$((COUNTER + 1))
            VERSION="${BASE}.${COUNTER}"
          done
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Tag and create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CALVER_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          LAST_TAG=$(git tag --sort=version:refname | grep -E '^[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$' | tail -1)
          if [ -n "$LAST_TAG" ]; then
            NOTES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges)
          fi
          [ -z "$NOTES" ] && NOTES="- Maintenance / dependency updates"

          gh release create "${CALVER_TAG}" \
            --title "${CALVER_TAG}" \
            --notes "$NOTES" \
            --target "${{ github.sha }}" \
            --latest

  deploy:
    name: Deploy Worker
    needs: tag-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          APP_VERSION: ${{ needs.tag-release.outputs.calver_tag }}
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
